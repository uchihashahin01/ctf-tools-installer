name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build binary with PyInstaller
        run: |
          pyinstaller \
            --onefile \
            --name ctf-tools \
            --add-data "ctf_tools/web/templates:ctf_tools/web/templates" \
            --add-data "ctf_tools/web/static:ctf_tools/web/static" \
            --hidden-import ctf_tools \
            --hidden-import ctf_tools.core \
            --hidden-import ctf_tools.cli \
            --hidden-import ctf_tools.tui \
            --hidden-import ctf_tools.updater \
            --hidden-import ctf_tools.web \
            --hidden-import ctf_tools.web.app \
            main.py

      - name: Verify binary
        run: |
          ls -lh dist/ctf-tools
          file dist/ctf-tools

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/ctf-tools
